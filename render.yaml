services:
  - type: web
    name: battle-arena-mcp
    runtime: node
    rootDir: mcp-server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: TRANSPORT
        value: http
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: BASE_URL
        sync: false
      - key: DB_PATH
        value: /opt/render/project/data/battles.db
    disk:
      name: battles-data
      mountPath: /opt/render/project/data
      sizeGB: 1

  # ── Keep-alive: prevents free tier spin-down (every 14 min) ──
  - type: cron
    name: keep-alive-ping
    runtime: node
    schedule: "*/14 * * * *"
    buildCommand: echo 'no build needed'
    startCommand: node -e "fetch('https://ai-battle-arena-ngrt.onrender.com/health').then(r=>r.json()).then(d=>console.log('[keep-alive] ok',JSON.stringify(d))).catch(e=>console.error('[keep-alive] fail',e))"
    region: oregon
